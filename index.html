<!DOCTYPE html>
<html>
<head>
  <title>GeoWash Special Offer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1E88E5;
      margin-bottom: 20px;
    }

    .offer {
      font-size: 32px;
      font-weight: bold;
      color: #2E7D32;
      margin: 30px 0;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🎉 Your GeoWash Offer</h1>

  <div class="offer" id="offer"></div>

  <p>Show this offer during your wash appointment.</p>
</div>

<script>
const offers = [];

for (let i = 0; i < 120; i++) offers.push("$2 OFF");
for (let i = 0; i < 50; i++) offers.push("$3 OFF");
for (let i = 0; i < 20; i++) offers.push("$5 OFF");
for (let i = 0; i < 9; i++) offers.push("FREE AIR FRESHENER");

offers.push("🎉 FREE PREMIUM WASH 🎉");

const randomOffer = offers[Math.floor(Math.random() * offers.length)];

document.getElementById("offer").innerText = randomOffer;

if (randomOffer.includes("FREE PREMIUM WASH")) {
  document.body.style.background = "linear-gradient(135deg, #0f172a, #1e3a8a)";

  const confetti = document.createElement("div");

  confetti.innerHTML = `
    <div style="
      position: fixed;
      top: 30px;
      left: 0;
      width: 100%;
      pointer-events: none;
      font-size: 42px;
      text-align: center;
      color: white;
      font-weight: bold;
      z-index: 999;
    ">
      🎉 🎊 ✨ 🚗 🎉 🎊 ✨
      <br>
      JACKPOT!
    </div>
  `;

  document.body.appendChild(confetti);
}
</script>

</body>
</html>
