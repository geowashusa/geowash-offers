<!DOCTYPE html>
<html>
<head>
  <title>GeoWash Special Offer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      color: #1E88E5;
      margin-bottom: 20px;
    }

    .offer {
      font-size: 32px;
      font-weight: bold;
      color: #2E7D32;
      margin: 30px 0;
    }

    .button {
      display: inline-block;
      padding: 15px 25px;
      background: #1E88E5;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>🎉 Your GeoWash Offer</h1>

  <div class="offer" id="offer"></div>

  <p>
    Show this offer during your wash appointment.
  </p>

  <a class="button" href="https://linktr.ee/geowashusa">
    Book Your Wash
  </a>

</div>

<script>

const offers = [
  "$2 OFF",
  "$3 OFF",
  "$5 OFF",
  "FREE AIR FRESHENER"
];

const randomOffer =
  offers[Math.floor(Math.random() * offers.length)];

document.getElementById("offer").innerText = randomOffer;

</script>

</body>
</html>
