<!DOCTYPE html>
<html>
<head>
  <title>GeoWash Special Offer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 40px 25px;
      border-radius: 22px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12);
    }

    h1 {
      color: #1E88E5;
      margin: 0 0 25px 0;
      font-size: 34px;
      line-height: 1.1;
    }

    .offer {
      font-size: 36px;
      font-weight: bold;
      color: #2E7D32;
      margin: 25px 0;
      line-height: 1.2;
    }

    .jackpot-title {
      font-size: 42px;
      font-weight: bold;
      color: #111;
      margin-bottom: 25px;
      line-height: 1.1;
    }

    .jackpot-icons {
      font-size: 34px;
      margin-bottom: 25px;
    }

    p {
      font-size: 18px;
      line-height: 1.4;
      margin-top: 25px;
    }
  </style>
</head>

<body>

<div class="card" id="card">
  <h1>🎉 Your GeoWash Offer</h1>

  <div class="offer" id="offer"></div>

  <p>Show this offer during your wash appointment.</p>
</div>

<script>
const offers = [];

for (let i = 0; i < 120; i++) offers.push("$2 OFF");
for (let i = 0; i < 50; i++) offers.push("$3 OFF");
for (let i = 0; i < 20; i++) offers.push("$5 OFF");
for (let i = 0; i < 9; i++) offers.push("FREE AIR FRESHENER");

offers.push("FREE PREMIUM WASH");

const randomOffer = offers[Math.floor(Math.random() * offers.length)];

const offerBox = document.getElementById("offer");
const card = document.getElementById("card");

if (randomOffer === "FREE PREMIUM WASH") {
  document.body.style.background = "linear-gradient(135deg, #0f172a, #1e3a8a)";

  card.innerHTML = `
    <div class="jackpot-icons">🎉 🎊 ✨ 🚗 ✨ 🎊 🎉</div>

    <div class="jackpot-title">JACKPOT!</div>

    <h1>Your GeoWash Offer</h1>

    <div class="offer">
      FREE PREMIUM<br>WASH
    </div>

    <p>Show this offer during your wash appointment.</p>
  `;
} else {
  offerBox.innerText = randomOffer;
}
</script>

</body>
</html>
